<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Clowder app icon: tiled panes (deck's identity — organized parallel sessions).
       Diagonal amber cells = active panes; muted cells = the rest. Brand accent on warm-neutral dark. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232019"/>
      <stop offset="1" stop-color="#141210"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9b06a"/>
      <stop offset="1" stop-color="#c2954f"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect x="268" y="268" width="216" height="216" rx="44" fill="url(#amber)"/>
  <rect x="540" y="268" width="216" height="216" rx="44" fill="#37342d"/>
  <rect x="268" y="540" width="216" height="216" rx="44" fill="#37342d"/>
  <rect x="540" y="540" width="216" height="216" rx="44" fill="url(#amber)"/>
</svg>
